<!-- Chat Messages Area -->
<div class="flex-1 overflow-auto p-4 {% if not start_active %}d-none{% endif %}" id="chat-messages" style="background: #efeae2; min-height: 400px; max-height: 600px;">
    <!-- Messages will be injected here -->
</div>

<!-- Chat Input Form -->
<div class="p-3 bg-white border-top border-300 {% if not start_active %}d-none{% endif %}" id="chat-input-area">
    <form id="chat-form" class="d-flex w-100">
        <input type="hidden" id="active-customer-id" value="{{ initial_customer_id|default:'' }}">
        <input type="text" id="chat-input" class="form-control rounded-pill me-2" placeholder="Type a message..." autocomplete="off" required>
        <button type="submit" class="btn btn-primary rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
            <i class="fas fa-paper-plane"></i>
        </button>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let currentCustomerId = document.getElementById('active-customer-id').value;
    let pollInterval = null;
    let lastRenderedCount = 0;

    const chatMessages = document.getElementById('chat-messages');
    const chatInputArea = document.getElementById('chat-input-area');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const activeCustomerIdInput = document.getElementById('active-customer-id');
    
    // Globally exposed for external callers (like contact lists)
    window.loadChat = function(customerId) {
        currentCustomerId = customerId;
        
        chatMessages.classList.remove('d-none');
        chatInputArea.classList.remove('d-none');
        activeCustomerIdInput.value = customerId;
        
        lastRenderedCount = 0; // reset for new chat
        chatMessages.innerHTML = '';
        fetchMessages(customerId, true);
        
        // Start polling
        if(pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(() => {
            // Check if user is scrolled near bottom
            const isScrolledToBottom = chatMessages.scrollHeight - chatMessages.scrollTop <= chatMessages.clientHeight + 50;
            fetchMessages(customerId, isScrolledToBottom);
        }, 5000);
    };

    // Auto-load if initial ID was provided
    if(currentCustomerId) {
        window.loadChat(currentCustomerId);
    }

    function fetchMessages(customerId, scrollToBottom) {
        fetch(`/core/whatsapp/chat/${customerId}/`)
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    if (data.chats.length !== lastRenderedCount) {
                        renderMessages(data.chats, scrollToBottom);
                        lastRenderedCount = data.chats.length;
                    }
                }
            })
            .catch(err => console.error("Error fetching chats", err));
    }

    function renderMessages(chats, scrollToBottom) {
        let html = '';
        let lastDateStr = null;

        chats.forEach(chat => {
            const isOutgoing = chat.direction === 'outgoing';
            const align = isOutgoing ? 'justify-content-end' : 'justify-content-start';
            const bgClass = isOutgoing ? 'bg-success-subtle text-dark' : 'bg-white text-dark';
            
            let dateObj = new Date(chat.timestamp);
            let timeStr = chat.timestamp;
            let dateStr = '';
            try {
                timeStr = dateObj.toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit'});
                dateStr = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                if (dateObj.toDateString() === today.toDateString()) {
                    dateStr = 'Today';
                } else if (dateObj.toDateString() === yesterday.toDateString()) {
                    dateStr = 'Yesterday';
                }
            } catch(e) {}
            
            if (dateStr !== lastDateStr) {
                html += `
                    <div class="d-flex justify-content-center mb-3">
                        <span class="badge bg-secondary-subtle text-secondary fw-normal fs-10 px-3 py-1 shadow-sm">${dateStr}</span>
                    </div>
                `;
                lastDateStr = dateStr;
            }

            html += `
                <div class="d-flex ${align} mb-3">
                    <div class="p-2 rounded-3 shadow-sm ${bgClass}" style="max-width: 75%;">
                        <div style="white-space: pre-wrap; word-wrap: break-word;">${escapeHTML(chat.message)}</div>
                        <div class="text-end mt-1"><small class="text-muted" style="font-size: 0.65rem;">${timeStr}</small></div>
                    </div>
                </div>
            `;
        });
        chatMessages.innerHTML = html;
        if(scrollToBottom) {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    }

    chatForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const customerId = activeCustomerIdInput.value;
        const msg = chatInput.value.trim();
        if(!msg || !customerId) return;
        
        // Optimistic UI update
        const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const html = `
            <div class="d-flex justify-content-end mb-3 opacity-50" id="temp-msg">
                <div class="p-2 rounded-3 shadow-sm bg-success-subtle text-dark" style="max-width: 75%;">
                    <div style="white-space: pre-wrap; word-wrap: break-word;">${escapeHTML(msg)}</div>
                    <div class="text-end mt-1"><small class="text-muted" style="font-size: 0.65rem;">${timeStr} (Sending...)</small></div>
                </div>
            </div>
        `;
        chatMessages.insertAdjacentHTML('beforeend', html);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        chatInput.value = '';

        const formData = new FormData();
        formData.append('message', msg);

        fetch(`/core/whatsapp/send/${customerId}/`, {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                fetchMessages(customerId, true);
            } else {
                alert("Error sending message: " + data.message);
                const tempMsg = document.getElementById('temp-msg');
                if (tempMsg) tempMsg.remove();
            }
        })
        .catch(err => {
            console.error("Error sending message", err);
            alert("Error sending message.");
            const tempMsg = document.getElementById('temp-msg');
            if (tempMsg) tempMsg.remove();
        });
    });

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag)
        );
    }
});
</script>
