
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-user-plus"></i> Create New CRM User</h4>
                </div>
                <div class="card-body">
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        {% if form.errors %}
                            <div class="alert alert-danger">
                                {{ form.errors }}
                            </div>
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            {{ form.username }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            {{ form.email }}
                            <small class="text-muted">An invitation link will be sent to this email.</small>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Assign Role</label>
                                {{ form.role }}
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Region (Optional)</label>
                                {{ form.region }}
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'dashboard_admin' %}" class="btn btn-secondary me-md-2">Cancel</a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-paper-plane"></i> Create & Send Invite
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
