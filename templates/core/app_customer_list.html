{% extends 'core/base.html' %}

{% block content %}
<div class="mb-9">
    <div class="row g-3 mb-4">
        <div class="col-auto">
            <h2 class="mb-0">App Buyers</h2>
            <p class="text-body-tertiary mb-0">Browse and inspect remote registered application customers/buyers synced from the App Database.</p>
        </div>
    </div>

    <!-- Overhauled External Customer Directory Card -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="p-4 border-bottom border-translucent">
                <form class="row g-3 align-items-center" id="customer-filter-form" onsubmit="return false;">
                    <div class="col-12 col-md-8">
                        <label class="form-label fs-10 fw-bold text-uppercase text-body-tertiary">Search App Buyers</label>
                        <div class="search-box position-relative">
                            <input class="form-control rounded-pill ps-5" 
                                   type="search" 
                                   name="q" 
                                   value="{{ query|default:'' }}"
                                   placeholder="Search by name, email or phone number..."
                                   hx-get="{% url 'hostinger_customer_list' %}"
                                   hx-trigger="keyup changed delay:500ms"
                                   hx-target="#hostinger-customer-table-wrapper"
                                   hx-include="#customer-filter-form"
                                   hx-indicator="#hostinger-spinner" />
                            <span class="fas fa-search search-box-icon position-absolute top-50 translate-middle-y ms-3 text-body-tertiary"></span>
                        </div>
                    </div>
                    <div class="col-12 col-md-4 d-flex align-items-end justify-content-center pb-2">
                        <div class="spinner-border spinner-border-sm text-primary htmx-indicator" role="status" id="hostinger-spinner"></div>
                    </div>
                </form>
            </div>

            <!-- HTMX Swap Target -->
            <div id="hostinger-customer-table-wrapper">
                {% include 'core/partials/hostinger_customer_table.html' %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
