{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="mb-9">
    <div class="row g-3 mb-4 align-items-center justify-content-between">
        <div class="col">
            <h2 class="mb-0">Product Management</h2>
            <p class="text-body-tertiary mb-0">Browse and filter remote products uploaded on the application.</p>
        </div>
        <div class="col-auto">
            <span class="badge badge-phoenix badge-phoenix-info fs-8">App Products</span>
        </div>
    </div>

    <!-- Live HTMX Filter & Search Panel -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form class="row g-3 align-items-center" hx-get="{% url 'product_list' %}" hx-target="#product-table-wrapper" hx-trigger="change, keyup changed delay:500ms" hx-indicator="#product-spinner">
                <div class="col-md-4">
                    <label class="form-label fs-10 fw-bold text-uppercase text-body-tertiary">Search Products</label>
                    <div class="search-box position-relative">
                        <input class="form-control rounded-pill ps-5" 
                               type="search" 
                               name="q" 
                               value="{{ query|default:'' }}" 
                               placeholder="Search by name, title, or HSN..." />
                        <span class="fas fa-search search-box-icon position-absolute top-50 translate-middle-y ms-3 text-body-tertiary"></span>
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label fs-10 fw-bold text-uppercase text-body-tertiary">Category</label>
                    <select class="form-select rounded-pill" name="category">
                        <option value="">All Categories</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if selected_category == cat.id|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fs-10 fw-bold text-uppercase text-body-tertiary">Brand</label>
                    <select class="form-select rounded-pill" name="brand">
                        <option value="">All Brands</option>
                        {% for brand_name in brands %}
                        <option value="{{ brand_name }}" {% if selected_brand == brand_name %}selected{% endif %}>{{ brand_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end pt-4 justify-content-center">
                    <div class="spinner-border spinner-border-sm text-primary htmx-indicator" role="status" id="product-spinner"></div>
                </div>
            </form>
        </div>
    </div>

    <!-- Overhauled Product Table Card -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div id="product-table-wrapper">
                {% include 'core/partials/product_table.html' %}
            </div>
        </div>
    </div>
</div>

<style>
    .w-fit-content { width: fit-content; }
</style>
{% endblock %}
