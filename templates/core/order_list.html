{% extends 'core/base.html' %}

{% block content %}
<div class="mb-9">
    <div class="row g-3 mb-4 align-items-center justify-content-between">
        <div class="col-auto">
            <h2 class="mb-0">App Order Management</h2>
            <p class="text-body-tertiary mb-0">Browse and filter remote orders synced from the Hostinger Database.</p>
        </div>
    </div>

    <!-- Live HTMX Filter & Search Panel -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form class="row g-3 align-items-center" hx-get="{% url 'order_list' %}" hx-target="#order-table-wrapper" hx-trigger="change, keyup changed delay:500ms" hx-indicator="#order-spinner">
                <div class="col-12 col-md-6">
                    <label class="form-label fs-10 fw-bold text-uppercase text-body-tertiary">Search Orders</label>
                    <div class="search-box position-relative">
                        <input class="form-control rounded-pill ps-5" 
                               type="search" 
                               name="q" 
                               value="{{ query|default:'' }}"
                               placeholder="Search by order number, address..." />
                        <span class="fas fa-search search-box-icon position-absolute top-50 translate-middle-y ms-3 text-body-tertiary"></span>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label fs-10 fw-bold text-uppercase text-body-tertiary">Order Status</label>
                    <select class="form-select rounded-pill" name="status">
                        <option value="">All Statuses</option>
                        <option value="pending" {% if selected_status == 'pending' %}selected{% endif %}>Pending</option>
                        <option value="processing" {% if selected_status == 'processing' %}selected{% endif %}>Processing</option>
                        <option value="shipped" {% if selected_status == 'shipped' %}selected{% endif %}>Shipped</option>
                        <option value="delivered" {% if selected_status == 'delivered' %}selected{% endif %}>Delivered / Completed</option>
                        <option value="cancelled" {% if selected_status == 'cancelled' %}selected{% endif %}>Cancelled</option>
                    </select>
                </div>
                <div class="col-12 col-md-2 d-flex align-items-end pt-4 justify-content-center">
                    <div class="spinner-border spinner-border-sm text-primary htmx-indicator" role="status" id="order-spinner"></div>
                </div>
            </form>
        </div>
    </div>

    <!-- Overhauled Order Table Card -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div id="order-table-wrapper">
                {% include 'core/partials/order_table.html' %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
