{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">App User Login</h3>
                    <p class="text-body-tertiary">Access Application User Portal</p>
                </div>

                {% if messages %}
                <div class="mb-3">
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3 text-start">
                        <label class="form-label" for="email">Email address</label>
                        <div class="form-icon-container">
                            <input class="form-control form-icon-input" id="email" name="email" type="email" placeholder="name@example.com" required />
                            <span class="fas fa-user text-body-tertiary form-icon"></span>
                        </div>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label" for="password">Password</label>
                        <div class="form-icon-container">
                            <input class="form-control form-icon-input" id="password" name="password" type="password" placeholder="Password" required />
                            <span class="fas fa-key text-body-tertiary form-icon"></span>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100 mb-3" type="submit">Sign In</button>
                </form>

                <div class="text-center">
                    <a class="fs-9 fw-bold" href="{% url 'hostinger_user_list' %}">Go to User List instead</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
