{% extends 'core/base.html' %}

{% block content %}
<div class="mb-9">
    <div class="row g-3 mb-4 align-items-center justify-content-between">
        <div class="col-auto">
            <h2 class="mb-0">Invoice Management</h2>
            <p class="text-body-tertiary mb-0">Generate, lock, print, and distribute client invoices directly.</p>
        </div>
        <div class="col-auto">
            <a href="{% url 'create_invoice' %}" class="btn btn-primary">
                <i class="fas fa-plus me-2"></i>Generate New Invoice
            </a>
        </div>
    </div>

    <!-- Live HTMX Filter & Search Panel -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form class="row g-3 align-items-center" hx-get="{% url 'invoice_list' %}" hx-target="#invoice-table-wrapper" hx-trigger="change, keyup changed delay:500ms" hx-indicator="#invoice-spinner">
                <div class="col-12 col-md-6">
                    <label class="form-label fs-10 fw-bold text-uppercase text-body-tertiary">Search Invoices</label>
                    <div class="search-box position-relative">
                        <input class="form-control rounded-pill ps-5" 
                               type="search" 
                               name="q" 
                               value="{{ query|default:'' }}"
                               placeholder="Search by invoice number or client name..." />
                        <span class="fas fa-search search-box-icon position-absolute top-50 translate-middle-y ms-3 text-body-tertiary"></span>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label fs-10 fw-bold text-uppercase text-body-tertiary">Invoice Status</label>
                    <select class="form-select rounded-pill" name="status">
                        <option value="">All Statuses</option>
                        <option value="draft" {% if selected_status == 'draft' %}selected{% endif %}>Draft Invoices</option>
                        <option value="finalized" {% if selected_status == 'finalized' %}selected{% endif %}>Finalized / Locked</option>
                    </select>
                </div>
                <div class="col-12 col-md-2 d-flex align-items-end pt-4 justify-content-center">
                    <div class="spinner-border spinner-border-sm text-primary htmx-indicator" role="status" id="invoice-spinner"></div>
                </div>
            </form>
        </div>
    </div>

    <!-- Overhauled Invoice Table Card -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div id="invoice-table-wrapper">
                {% include 'core/partials/invoice_table.html' %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
